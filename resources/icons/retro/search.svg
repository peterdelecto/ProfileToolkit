<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Magnifying glass — Win95 bevel style -->
  <g transform="translate(32, 32)">
    <!-- Handle shadow -->
    <line x1="7" y1="7" x2="19" y2="19" stroke="#333" stroke-width="7" stroke-linecap="round"/>
    <!-- Handle -->
    <line x1="6" y1="6" x2="18" y2="18" stroke="#b0b0b0" stroke-width="5" stroke-linecap="round"/>
    <!-- Handle bevel highlights -->
    <line x1="5.5" y1="5" x2="17.5" y2="17" stroke="#fff" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <line x1="7" y1="7.5" x2="19" y2="19.5" stroke="#555" stroke-width="1" opacity="0.4" stroke-linecap="round"/>

    <!-- Lens outer ring — dark outline -->
    <circle cx="-4" cy="-4" r="15.5" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Lens ring — beveled -->
    <circle cx="-4" cy="-4" r="14" fill="none" stroke="#c0c0c0" stroke-width="4"/>
    <!-- Highlight arc (top-left) -->
    <path d="M-14,-14 A14,14 0 0,0 -18,-4" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
    <!-- Shadow arc (bottom-right) -->
    <path d="M6,6 A14,14 0 0,0 10,-4" fill="none" stroke="#555" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>

    <!-- Glass interior — sunken inset -->
    <circle cx="-4" cy="-4" r="10.5" fill="#555" opacity="0.15"/>
    <!-- Glass shine -->
    <path d="M-9,-13 A9,9 0 0,1 1,-13" fill="none" stroke="#e0e0e0" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
  </g>
</svg>
