<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Gear — Win95 bevel style -->
  <g transform="translate(32, 32)">
    <!-- Gear body shadow -->
    <path d="M15.6,-3.7 L21.7,-3.4 L21.7,3.4 L15.6,3.7 L13.6,8.4 L17.8,12.9 L12.9,17.8 L8.4,13.6 L3.7,15.6 L3.4,21.7 L-3.4,21.7 L-3.7,15.6 L-8.4,13.6 L-12.9,17.8 L-17.8,12.9 L-13.6,8.4 L-15.6,3.7 L-21.7,3.4 L-21.7,-3.4 L-15.6,-3.7 L-13.6,-8.4 L-17.8,-12.9 L-12.9,-17.8 L-8.4,-13.6 L-3.7,-15.6 L-3.4,-21.7 L3.4,-21.7 L3.7,-15.6 L8.4,-13.6 L12.9,-17.8 L17.8,-12.9 L13.6,-8.4 Z"
      fill="#b0b0b0" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Bevel highlight — top-left teeth get white edge -->
    <path d="M-3.4,-21.7 L3.4,-21.7 L3.7,-15.6" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.5" stroke-linejoin="round"/>
    <path d="M-3.7,-15.6 L-8.4,-13.6 L-12.9,-17.8" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.45" stroke-linejoin="round"/>
    <path d="M-17.8,-12.9 L-13.6,-8.4 L-15.6,-3.7 L-21.7,-3.4" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.4" stroke-linejoin="round"/>
    <path d="M-21.7,3.4 L-15.6,3.7" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.35" stroke-linejoin="round"/>

    <!-- Bevel shadow — bottom-right teeth get dark edge -->
    <path d="M3.4,21.7 L-3.4,21.7 L-3.7,15.6" fill="none" stroke="#555" stroke-width="0.8" opacity="0.5" stroke-linejoin="round"/>
    <path d="M8.4,13.6 L12.9,17.8" fill="none" stroke="#555" stroke-width="0.8" opacity="0.45" stroke-linejoin="round"/>
    <path d="M17.8,12.9 L13.6,8.4 L15.6,3.7 L21.7,3.4" fill="none" stroke="#555" stroke-width="0.8" opacity="0.5" stroke-linejoin="round"/>
    <path d="M21.7,-3.4 L15.6,-3.7" fill="none" stroke="#555" stroke-width="0.8" opacity="0.4" stroke-linejoin="round"/>

    <!-- Inner ring — beveled -->
    <circle cx="0" cy="0" r="10.5" fill="none" stroke="#333" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="#888" stroke="#999" stroke-width="1"/>
    <!-- Highlight arc -->
    <path d="M-7,-7.1 A10,10 0 0,1 7,-7.1" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
    <!-- Shadow arc -->
    <path d="M-7,7.1 A10,10 0 0,0 7,7.1" fill="none" stroke="#555" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>

    <!-- Center hole — sunken inset -->
    <circle cx="0" cy="0" r="5" fill="#333" stroke="#555" stroke-width="0.8"/>
    <!-- Inset highlight (reversed — top gets shadow, bottom gets light for "sunken") -->
    <path d="M-3.5,-3.5 A5,5 0 0,1 3.5,-3.5" fill="none" stroke="#222" stroke-width="0.6" opacity="0.5"/>
    <path d="M-3.5,3.5 A5,5 0 0,0 3.5,3.5" fill="none" stroke="#666" stroke-width="0.6" opacity="0.4"/>
  </g>
</svg>
