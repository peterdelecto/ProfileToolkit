<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Floppy disk — Win95 bevel style -->
  <g transform="translate(32, 32)">
    <!-- Disk body — beveled -->
    <rect x="-20" y="-20" width="40" height="40" rx="2" fill="#b0b0b0" stroke="#333" stroke-width="1.4"/>
    <!-- Top-left highlight -->
    <line x1="-20" y1="-20" x2="20" y2="-20" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="-20" y1="-20" x2="-20" y2="20" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <!-- Bottom-right shadow -->
    <line x1="20" y1="-20" x2="20" y2="20" stroke="#555" stroke-width="1" opacity="0.6"/>
    <line x1="-20" y1="20" x2="20" y2="20" stroke="#555" stroke-width="1" opacity="0.6"/>

    <!-- Metal slider — beveled -->
    <rect x="-8" y="-20" width="16" height="14" rx="1" fill="#888" stroke="#333" stroke-width="1.2"/>
    <line x1="-8" y1="-20" x2="8" y2="-20" stroke="#fff" stroke-width="0.7" opacity="0.4"/>
    <line x1="8" y1="-20" x2="8" y2="-6" stroke="#555" stroke-width="0.7" opacity="0.5"/>
    <!-- Slider opening — inset -->
    <rect x="-3" y="-19" width="6" height="10" rx="0.5" fill="#555" stroke="#333" stroke-width="0.8"/>
    <line x1="-3" y1="-19" x2="3" y2="-19" stroke="#333" stroke-width="0.5" opacity="0.6"/>
    <line x1="-3" y1="-9" x2="3" y2="-9" stroke="#fff" stroke-width="0.5" opacity="0.3"/>

    <!-- Label area — beveled inset -->
    <rect x="-15" y="4" width="30" height="16" rx="1.5" fill="#e0e0e0" stroke="#333" stroke-width="1"/>
    <!-- Inset shadow (top/left dark = sunken) -->
    <line x1="-15" y1="4" x2="15" y2="4" stroke="#555" stroke-width="0.7" opacity="0.5"/>
    <line x1="-15" y1="4" x2="-15" y2="20" stroke="#555" stroke-width="0.7" opacity="0.5"/>
    <!-- Inset highlight (bottom/right light = sunken) -->
    <line x1="15" y1="4" x2="15" y2="20" stroke="#fff" stroke-width="0.7" opacity="0.4"/>
    <line x1="-15" y1="20" x2="15" y2="20" stroke="#fff" stroke-width="0.7" opacity="0.4"/>

    <!-- Label lines -->
    <line x1="-10" y1="10" x2="10" y2="10" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-10" y1="14" x2="6" y2="14" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
