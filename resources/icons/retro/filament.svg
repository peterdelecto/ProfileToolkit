<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Filament spool — Win95 bevel style -->
  <g transform="translate(32, 32)">
    <!-- Back flange -->
    <ellipse cx="5" cy="0" rx="18" ry="22" fill="none" stroke="#888" stroke-width="2"/>

    <!-- Barrel (wound filament side) -->
    <path d="M-13,-18 L3,-22 L3,22 L-13,18 Z" fill="#00d4a0" opacity="0.5" stroke="#333" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M-13,-18 C-17,-12 -17,12 -13,18" fill="none" stroke="#00b88c" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-6,-7 L3,-8.5 L3,8.5 L-6,7 Z" fill="#333" opacity="0.5"/>

    <!-- Front flange — bevel effect -->
    <ellipse cx="-3" cy="0" rx="18" ry="22" fill="none" stroke="#333" stroke-width="3"/>
    <ellipse cx="-3" cy="0" rx="18" ry="22" fill="none" stroke="#b0b0b0" stroke-width="2"/>
    <!-- Highlight top-left arc -->
    <path d="M-3,-22 A18,22 0 0,0 -21,0" fill="none" stroke="#fff" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <!-- Shadow bottom-right arc -->
    <path d="M-3,22 A18,22 0 0,0 15,0" fill="none" stroke="#555" stroke-width="1" opacity="0.5" stroke-linecap="round"/>

    <!-- Wound filament ring -->
    <ellipse cx="-3" cy="0" rx="13" ry="16" fill="none" stroke="#333" stroke-width="5" opacity="0.3"/>
    <ellipse cx="-3" cy="0" rx="13" ry="16" fill="none" stroke="#00d4a0" stroke-width="3.5" opacity="0.55"/>

    <!-- Hub ring — bevel -->
    <ellipse cx="-3" cy="0" rx="6" ry="7.5" fill="none" stroke="#333" stroke-width="2.8" opacity="0.4"/>
    <ellipse cx="-3" cy="0" rx="6" ry="7.5" fill="none" stroke="#b0b0b0" stroke-width="2"/>

    <!-- Center hole -->
    <ellipse cx="-3" cy="0" rx="4" ry="5" fill="#333"/>
    <path d="M-3,-5 A4,5 0 0,0 -7,0" fill="none" stroke="#555" stroke-width="0.8" opacity="0.5"/>

    <!-- Spokes -->
    <g stroke="#b0b0b0" stroke-width="2.2" fill="none" stroke-linecap="round">
      <line x1="-3" y1="-7.5" x2="-3" y2="-22"/>
      <line x1="3" y1="-3.8" x2="13" y2="-11"/>
      <line x1="3" y1="3.8" x2="13" y2="11"/>
      <line x1="-3" y1="7.5" x2="-3" y2="22"/>
      <line x1="-9" y1="3.8" x2="-17" y2="11"/>
      <line x1="-9" y1="-3.8" x2="-17" y2="-11"/>
    </g>
  </g>
</svg>
