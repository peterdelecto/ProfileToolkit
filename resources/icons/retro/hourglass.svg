<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Hourglass — Win95 bevel style -->
  <g transform="translate(32, 32)">
    <!-- Top cap — beveled -->
    <rect x="-13" y="-24" width="26" height="4" rx="1.5" fill="#b0b0b0" stroke="#333" stroke-width="1.2"/>
    <line x1="-13" y1="-24" x2="13" y2="-24" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="-13" y1="-20" x2="13" y2="-20" stroke="#555" stroke-width="0.8" opacity="0.5"/>

    <!-- Bottom cap — beveled -->
    <rect x="-13" y="20" width="26" height="4" rx="1.5" fill="#b0b0b0" stroke="#333" stroke-width="1.2"/>
    <line x1="-13" y1="20" x2="13" y2="20" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="-13" y1="24" x2="13" y2="24" stroke="#555" stroke-width="0.8" opacity="0.5"/>

    <!-- Glass body outline — dark -->
    <path d="M-11,-20
             L-11,-6
             C-11,-3 -3,-1.5 -2.5,0
             C-3,1.5 -11,3 -11,6
             L-11,20
             L11,20
             L11,6
             C11,3 3,1.5 2.5,0
             C3,-1.5 11,-3 11,-6
             L11,-20 Z"
          fill="none" stroke="#333" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Glass body — main stroke -->
    <path d="M-11,-20
             L-11,-6
             C-11,-3 -3,-1.5 -2.5,0
             C-3,1.5 -11,3 -11,6
             L-11,20
             L11,20
             L11,6
             C11,3 3,1.5 2.5,0
             C3,-1.5 11,-3 11,-6
             L11,-20 Z"
          fill="none" stroke="#b0b0b0" stroke-width="1.8" stroke-linejoin="round"/>
    <!-- Left highlight -->
    <line x1="-11" y1="-18" x2="-11" y2="-7" stroke="#fff" stroke-width="0.8" opacity="0.4"/>
    <line x1="-11" y1="7" x2="-11" y2="18" stroke="#fff" stroke-width="0.8" opacity="0.4"/>
    <!-- Right shadow -->
    <line x1="11" y1="-18" x2="11" y2="-7" stroke="#555" stroke-width="0.8" opacity="0.4"/>
    <line x1="11" y1="7" x2="11" y2="18" stroke="#555" stroke-width="0.8" opacity="0.4"/>

    <!-- Sand in bottom -->
    <path d="M-9,20
             L-9,8
             C-9,5 -2.5,3 -1.5,1.5
             L1.5,1.5
             C2.5,3 9,5 9,8
             L9,20 Z"
          fill="#00d4a0" opacity="0.7" stroke="#333" stroke-width="0.8"/>

    <!-- Sand in top -->
    <path d="M-9,-20 L9,-20 L9,-12 L-9,-12 Z"
          fill="#00d4a0" opacity="0.5" stroke="#333" stroke-width="0.8"/>

    <!-- Falling stream -->
    <rect x="-0.8" y="-8" width="1.6" height="9" rx="0.8" fill="#00d4a0" opacity="0.6"/>
  </g>
</svg>
