<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Stacked layers — Win95 bevel style -->
  <g transform="translate(32, 32)">
    <!-- Gray base platform — beveled -->
    <path d="M-22,16 L0,24 L22,16 L0,8 Z" fill="#888" stroke="#333" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M-22,16 L0,8 L22,16" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.35" stroke-linejoin="round"/>
    <path d="M22,16 L0,24 L-22,16" fill="none" stroke="#555" stroke-width="0.8" opacity="0.4" stroke-linejoin="round"/>

    <!-- Bottom layer — beveled -->
    <g transform="translate(0, 8)">
      <path d="M-20,4 L0,12 L20,4 L0,-4 Z" fill="#00d4a0" opacity="0.5" stroke="#333" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M-20,4 L0,-4 L20,4" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.3" stroke-linejoin="round"/>
      <path d="M20,4 L0,12 L-20,4" fill="none" stroke="#005" stroke-width="0.8" opacity="0.2" stroke-linejoin="round"/>
    </g>
    <!-- Middle layer — beveled -->
    <g transform="translate(0, -2)">
      <path d="M-20,4 L0,12 L20,4 L0,-4 Z" fill="#00d4a0" opacity="0.7" stroke="#333" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M-20,4 L0,-4 L20,4" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.3" stroke-linejoin="round"/>
      <path d="M20,4 L0,12 L-20,4" fill="none" stroke="#005" stroke-width="0.8" opacity="0.2" stroke-linejoin="round"/>
    </g>
    <!-- Top layer — beveled -->
    <g transform="translate(0, -12)">
      <path d="M-20,4 L0,12 L20,4 L0,-4 Z" fill="#00d4a0" stroke="#333" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M-20,4 L0,-4 L20,4" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.35" stroke-linejoin="round"/>
      <path d="M20,4 L0,12 L-20,4" fill="none" stroke="#005" stroke-width="0.8" opacity="0.25" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
