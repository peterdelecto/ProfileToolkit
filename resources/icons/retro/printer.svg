<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 3D Printer — Win95 bevel style -->
  <g transform="translate(32, 33)">
    <!-- Base slab -->
    <path d="M-22,11 L-16,7 L22,7 L16,11 Z" fill="#c0c0c0" stroke="#333" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M-16,7 L22,7" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <path d="M-22,11 L-22,19 L16,19 L16,11 Z" fill="#a8a8a8" stroke="#333" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M16,19 L16,11" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
    <path d="M-22,19 L16,19" stroke="#555" stroke-width="0.8" opacity="0.6"/>
    <path d="M16,11 L16,19 L22,15 L22,7 Z" fill="#888888" stroke="#333" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Build plate -->
    <path d="M-17,9.5 L-12,6 L17,6 L12,9.5 Z" fill="#555" stroke="#333" stroke-width="1" stroke-linejoin="round"/>

    <!-- Left upright -->
    <rect x="-19" y="-23" width="6" height="33" fill="#b0b0b0" stroke="#333" stroke-width="1.2"/>
    <line x1="-19" y1="-23" x2="-19" y2="10" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="-19" y1="-23" x2="-13" y2="-23" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="-13" y1="-23" x2="-13" y2="10" stroke="#555" stroke-width="0.8" opacity="0.6"/>

    <!-- Right upright -->
    <rect x="14" y="-23" width="6" height="33" fill="#b0b0b0" stroke="#333" stroke-width="1.2"/>
    <line x1="14" y1="-23" x2="14" y2="10" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="14" y1="-23" x2="20" y2="-23" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="20" y1="-23" x2="20" y2="10" stroke="#555" stroke-width="0.8" opacity="0.6"/>

    <!-- Crossbar -->
    <rect x="-19" y="-25" width="39" height="4" fill="#c0c0c0" stroke="#333" stroke-width="1.2"/>
    <line x1="-19" y1="-25" x2="20" y2="-25" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="-19" y1="-25" x2="-19" y2="-21" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="20" y1="-25" x2="20" y2="-21" stroke="#555" stroke-width="0.8" opacity="0.6"/>
    <line x1="-19" y1="-21" x2="20" y2="-21" stroke="#555" stroke-width="0.8" opacity="0.6"/>

    <!-- Gantry rail -->
    <rect x="-16" y="-17" width="29" height="3" rx="0.5" fill="#888" stroke="#333" stroke-width="1"/>

    <!-- Print head -->
    <rect x="-6" y="-14" width="12" height="9" rx="1.5" fill="#b0b0b0" stroke="#333" stroke-width="1.2"/>
    <line x1="-6" y1="-14" x2="6" y2="-14" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="-6" y1="-14" x2="-6" y2="-5" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="6" y1="-14" x2="6" y2="-5" stroke="#555" stroke-width="0.8" opacity="0.6"/>
    <line x1="-6" y1="-5" x2="6" y2="-5" stroke="#555" stroke-width="0.8" opacity="0.6"/>

    <!-- Heat block -->
    <rect x="-3.5" y="-5" width="7" height="4" rx="0.5" fill="#888" stroke="#333" stroke-width="1"/>
    <!-- Nozzle -->
    <path d="M-1.5,-1 L-0.8,1.5 L0.8,1.5 L1.5,-1 Z" fill="#555" stroke="#333" stroke-width="0.8"/>
  </g>
</svg>
