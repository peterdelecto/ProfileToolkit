<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Balance scales — Win95 bevel style -->
  <g transform="translate(32, 32)">
    <!-- Central pillar — beveled -->
    <line x1="-1" y1="-18" x2="-1" y2="18" stroke="#fff" stroke-width="2" opacity="0.35"/>
    <line x1="1" y1="-18" x2="1" y2="18" stroke="#555" stroke-width="2" opacity="0.4"/>
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#888" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Base — beveled -->
    <rect x="-11" y="16" width="22" height="4" rx="1" fill="#b0b0b0" stroke="#333" stroke-width="1.2"/>
    <line x1="-11" y1="16" x2="11" y2="16" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="-11" y1="20" x2="11" y2="20" stroke="#555" stroke-width="0.8" opacity="0.5"/>

    <!-- Crossbeam — beveled bar, slightly tilted -->
    <line x1="-20" y1="-12" x2="20" y2="-16" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <line x1="-20" y1="-12" x2="20" y2="-16" stroke="#c0c0c0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-20" y1="-13" x2="20" y2="-17" stroke="#fff" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
    <line x1="-20" y1="-11" x2="20" y2="-15" stroke="#555" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>

    <!-- Fulcrum triangle -->
    <polygon points="-5,-18 5,-18 0,-13" fill="#b0b0b0" stroke="#333" stroke-width="1.2"/>
    <line x1="-5" y1="-18" x2="0" y2="-13" stroke="#fff" stroke-width="0.7" opacity="0.4"/>

    <!-- Left pan strings -->
    <line x1="-20" y1="-12" x2="-17" y2="0" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-20" y1="-12" x2="-23" y2="0" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Left pan — beveled -->
    <path d="M-26,0 L-14,0 L-16,4 L-24,4 Z" fill="#c0c0c0" stroke="#333" stroke-width="1.2" stroke-linejoin="round"/>
    <line x1="-26" y1="0" x2="-14" y2="0" stroke="#fff" stroke-width="0.7" opacity="0.5"/>
    <line x1="-24" y1="4" x2="-16" y2="4" stroke="#555" stroke-width="0.7" opacity="0.5"/>
    <!-- Left teal block -->
    <rect x="-23" y="-3.5" width="6" height="3.5" rx="0.5" fill="#00d4a0" stroke="#333" stroke-width="1"/>

    <!-- Right pan strings -->
    <line x1="20" y1="-16" x2="17" y2="-4" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="20" y1="-16" x2="23" y2="-4" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Right pan — beveled -->
    <path d="M14,-4 L26,-4 L24,0 L16,0 Z" fill="#c0c0c0" stroke="#333" stroke-width="1.2" stroke-linejoin="round"/>
    <line x1="14" y1="-4" x2="26" y2="-4" stroke="#fff" stroke-width="0.7" opacity="0.5"/>
    <line x1="16" y1="0" x2="24" y2="0" stroke="#555" stroke-width="0.7" opacity="0.5"/>
    <!-- Right teal block -->
    <rect x="17" y="-7.5" width="6" height="3.5" rx="0.5" fill="#00d4a0" stroke="#333" stroke-width="1"/>
  </g>
</svg>
