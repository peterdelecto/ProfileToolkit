<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Compare icon — Concept E: Left-right arrows through center divider -->
  <!-- Clean split icon with opposing arrows — minimal, utility-style -->
  <circle cx="32" cy="32" r="29" fill="#474647"/>
  <g transform="translate(32, 32)">
    <!-- Left block -->
    <rect x="-22" y="-14" width="18" height="28" rx="2.5" fill="#c0c0c0" stroke="#888888" stroke-width="1"/>
    <!-- Left lines -->
    <line x1="-19" y1="-8" x2="-8" y2="-8" stroke="#555555" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-19" y1="-2" x2="-10" y2="-2" stroke="#555555" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-19" y1="4" x2="-8" y2="4" stroke="#00d4a0" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-19" y1="10" x2="-12" y2="10" stroke="#555555" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Right block -->
    <rect x="4" y="-14" width="18" height="28" rx="2.5" fill="#c0c0c0" stroke="#888888" stroke-width="1"/>
    <!-- Right lines -->
    <line x1="7" y1="-8" x2="18" y2="-8" stroke="#555555" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="7" y1="-2" x2="16" y2="-2" stroke="#555555" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="7" y1="4" x2="18" y2="4" stroke="#00d4a0" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="7" y1="10" x2="14" y2="10" stroke="#555555" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Center divider with opposing arrows -->
    <line x1="-2" y1="-18" x2="-2" y2="18" stroke="#888888" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>
    <line x1="2" y1="-18" x2="2" y2="18" stroke="#888888" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>
  </g>
</svg>
