<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Compare icon — Concept F: Venn diagram overlap -->
  <!-- Two overlapping circles — shared/different regions -->
  <circle cx="32" cy="32" r="29" fill="#474647"/>
  <g transform="translate(32, 32)">
    <!-- Left circle -->
    <circle cx="-8" cy="0" r="16" fill="none" stroke="#c0c0c0" stroke-width="2.5"/>
    <!-- Right circle -->
    <circle cx="8" cy="0" r="16" fill="none" stroke="#c0c0c0" stroke-width="2.5"/>

    <!-- Overlap region highlight — use clip paths -->
    <defs>
      <clipPath id="leftClip">
        <circle cx="-8" cy="0" r="15"/>
      </clipPath>
      <clipPath id="rightClip">
        <circle cx="8" cy="0" r="15"/>
      </clipPath>
    </defs>
    <!-- Intersection: teal fill -->
    <circle cx="8" cy="0" r="15" clip-path="url(#leftClip)" fill="#00d4a0" opacity="0.35"/>

    <!-- Left-only area indicator -->
    <circle cx="-14" cy="0" r="2.5" fill="#b0b0b0" opacity="0.6"/>
    <!-- Right-only area indicator -->
    <circle cx="14" cy="0" r="2.5" fill="#b0b0b0" opacity="0.6"/>
    <!-- Center overlap indicator -->
    <circle cx="0" cy="0" r="2.5" fill="#00d4a0" opacity="0.9"/>
  </g>
</svg>
