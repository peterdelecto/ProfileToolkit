<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Compare icon — Concept D: Overlapping documents with != -->
  <!-- Two offset documents overlapping, with a not-equal symbol -->
  <circle cx="32" cy="32" r="29" fill="#474647"/>
  <g transform="translate(32, 32)">
    <!-- Back document (offset right and down) -->
    <rect x="-4" y="-14" width="24" height="32" rx="2" fill="#b0b0b0" stroke="#888888" stroke-width="0.8"/>
    <line x1="-1" y1="-8" x2="16" y2="-8" stroke="#555555" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-1" y1="-2" x2="12" y2="-2" stroke="#555555" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-1" y1="4" x2="14" y2="4" stroke="#555555" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-1" y1="10" x2="10" y2="10" stroke="#555555" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Front document (offset left and up) -->
    <rect x="-20" y="-18" width="24" height="32" rx="2" fill="#c0c0c0" stroke="#888888" stroke-width="1"/>
    <line x1="-17" y1="-12" x2="0" y2="-12" stroke="#555555" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-17" y1="-6" x2="-4" y2="-6" stroke="#555555" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-17" y1="0" x2="-2" y2="0" stroke="#555555" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-17" y1="6" x2="-6" y2="6" stroke="#555555" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Not-equal badge (bottom-right) -->
    <circle cx="14" cy="12" r="8" fill="#1a1a1a" stroke="#00d4a0" stroke-width="1.5"/>
    <line x1="10" y1="10" x2="18" y2="10" stroke="#00d4a0" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="14" x2="18" y2="14" stroke="#00d4a0" stroke-width="2" stroke-linecap="round"/>
    <line x1="16.5" y1="7" x2="11.5" y2="17" stroke="#00d4a0" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>
