<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Filament spool — Heavy Win95 bevel -->
  <g transform="translate(32, 32)">
    <!-- Back flange — thick ring -->
    <ellipse cx="4" cy="0" rx="18" ry="22" fill="none" stroke="#333" stroke-width="3.5"/>
    <ellipse cx="4" cy="0" rx="18" ry="22" fill="none" stroke="#888" stroke-width="2"/>

    <!-- Barrel wound filament -->
    <path d="M-12,-17 L3,-21 L3,21 L-12,17 Z" fill="#C6FF00" opacity="0.55" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M-12,-17 C-16,-11 -16,11 -12,17" fill="none" stroke="#9ACD32" stroke-width="3" stroke-linecap="round"/>
    <path d="M-5,-6 L3,-7.5 L3,7.5 L-5,6 Z" fill="#333" opacity="0.5"/>

    <!-- Front flange — heavy bevel ring -->
    <ellipse cx="-3" cy="0" rx="19" ry="23" fill="none" stroke="#333" stroke-width="2" opacity="0.5"/>
    <ellipse cx="-3" cy="0" rx="18" ry="22" fill="none" stroke="#333" stroke-width="4"/>
    <ellipse cx="-3" cy="0" rx="18" ry="22" fill="none" stroke="#b0b0b0" stroke-width="2.5"/>
    <!-- Strong highlight top-left -->
    <path d="M-3,-22 A18,22 0 0,0 -21,0" fill="none" stroke="#ededed" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
    <!-- Strong shadow bottom-right -->
    <path d="M-3,22 A18,22 0 0,0 15,0" fill="none" stroke="#555" stroke-width="1.5" opacity="0.65" stroke-linecap="round"/>

    <!-- Wound filament ring — thick -->
    <ellipse cx="-3" cy="0" rx="13" ry="16" fill="none" stroke="#333" stroke-width="6" opacity="0.35"/>
    <ellipse cx="-3" cy="0" rx="13" ry="16" fill="none" stroke="#C6FF00" stroke-width="4" opacity="0.6"/>
    <!-- Filament ring bevel -->
    <path d="M-3,-16 A13,16 0 0,0 -16,0" fill="none" stroke="#DBFF66" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
    <path d="M-3,16 A13,16 0 0,0 10,0" fill="none" stroke="#005" stroke-width="1" opacity="0.3" stroke-linecap="round"/>

    <!-- Hub ring — beveled -->
    <ellipse cx="-3" cy="0" rx="6" ry="7.5" fill="none" stroke="#333" stroke-width="3.5" opacity="0.45"/>
    <ellipse cx="-3" cy="0" rx="6" ry="7.5" fill="none" stroke="#b0b0b0" stroke-width="2.2"/>
    <path d="M-3,-7.5 A6,7.5 0 0,0 -9,0" fill="none" stroke="#ededed" stroke-width="0.8" opacity="0.5"/>
    <path d="M-3,7.5 A6,7.5 0 0,0 3,0" fill="none" stroke="#555" stroke-width="0.8" opacity="0.5"/>

    <!-- Center hole — deep sunken -->
    <ellipse cx="-3" cy="0" rx="4" ry="5" fill="#222" stroke="#333" stroke-width="1.5"/>
    <path d="M-3,-5 A4,5 0 0,0 -7,0" fill="none" stroke="#111" stroke-width="0.8" opacity="0.5"/>
    <path d="M-3,5 A4,5 0 0,0 1,0" fill="none" stroke="#555" stroke-width="0.8" opacity="0.4"/>

    <!-- Spokes — thicker -->
    <g stroke="#b0b0b0" stroke-width="2.5" fill="none" stroke-linecap="round">
      <line x1="-3" y1="-7.5" x2="-3" y2="-22"/>
      <line x1="3" y1="-3.8" x2="13" y2="-11"/>
      <line x1="3" y1="3.8" x2="13" y2="11"/>
      <line x1="-3" y1="7.5" x2="-3" y2="22"/>
      <line x1="-9" y1="3.8" x2="-17" y2="11"/>
      <line x1="-9" y1="-3.8" x2="-17" y2="-11"/>
    </g>
  </g>
</svg>
