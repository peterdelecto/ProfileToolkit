<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Floppy disk — Heavy Win95 bevel -->
  <g transform="translate(32, 32)">
    <!-- Disk body — thick beveled -->
    <rect x="-20" y="-20" width="40" height="40" rx="1.5" fill="#b0b0b0" stroke="#333" stroke-width="2"/>
    <!-- Outer bevel — strong -->
    <line x1="-20" y1="-20" x2="20" y2="-20" stroke="#ededed" stroke-width="2" opacity="0.7"/>
    <line x1="-20" y1="-20" x2="-20" y2="20" stroke="#ededed" stroke-width="2" opacity="0.55"/>
    <line x1="20" y1="-20" x2="20" y2="20" stroke="#555" stroke-width="2" opacity="0.75"/>
    <line x1="-20" y1="20" x2="20" y2="20" stroke="#555" stroke-width="2" opacity="0.75"/>

    <!-- Metal slider — beveled raised -->
    <rect x="-9" y="-20" width="18" height="15" rx="1" fill="#a8a8a8" stroke="#333" stroke-width="1.5"/>
    <line x1="-9" y1="-20" x2="9" y2="-20" stroke="#c0c0c0" stroke-width="1" opacity="0.5"/>
    <line x1="-9" y1="-20" x2="-9" y2="-5" stroke="#c0c0c0" stroke-width="1" opacity="0.4"/>
    <line x1="9" y1="-20" x2="9" y2="-5" stroke="#555" stroke-width="1" opacity="0.6"/>
    <line x1="-9" y1="-5" x2="9" y2="-5" stroke="#555" stroke-width="1" opacity="0.6"/>

    <!-- Slider opening — deep sunken -->
    <rect x="-3.5" y="-19" width="7" height="11" rx="0.5" fill="#444" stroke="#222" stroke-width="1.2"/>
    <line x1="-3.5" y1="-19" x2="3.5" y2="-19" stroke="#222" stroke-width="0.8"/>
    <line x1="-3.5" y1="-19" x2="-3.5" y2="-8" stroke="#222" stroke-width="0.8"/>
    <line x1="3.5" y1="-19" x2="3.5" y2="-8" stroke="#666" stroke-width="0.8" opacity="0.5"/>
    <line x1="-3.5" y1="-8" x2="3.5" y2="-8" stroke="#666" stroke-width="0.8" opacity="0.5"/>

    <!-- Label area — deep sunken inset -->
    <rect x="-15" y="3" width="30" height="17" rx="1" fill="#e0e0e0" stroke="#333" stroke-width="1.2"/>
    <!-- Sunken bevel (reversed: top/left dark, bottom/right light) -->
    <line x1="-15" y1="3" x2="15" y2="3" stroke="#555" stroke-width="1.2" opacity="0.7"/>
    <line x1="-15" y1="3" x2="-15" y2="20" stroke="#555" stroke-width="1.2" opacity="0.55"/>
    <line x1="15" y1="3" x2="15" y2="20" stroke="#ededed" stroke-width="1.2" opacity="0.6"/>
    <line x1="-15" y1="20" x2="15" y2="20" stroke="#ededed" stroke-width="1.2" opacity="0.6"/>

    <!-- Label lines -->
    <line x1="-10" y1="10" x2="10" y2="10" stroke="#888" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-10" y1="14.5" x2="6" y2="14.5" stroke="#888" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>
