<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Magnifying glass — Heavy Win95 bevel -->
  <g transform="translate(32, 32)">
    <!-- Handle shadow -->
    <line x1="7" y1="7" x2="20" y2="20" stroke="#333" stroke-width="9" stroke-linecap="round"/>
    <!-- Handle body -->
    <line x1="6" y1="6" x2="19" y2="19" stroke="#b0b0b0" stroke-width="6" stroke-linecap="round"/>
    <!-- Handle bevel — strong -->
    <line x1="5" y1="5" x2="18" y2="18" stroke="#ededed" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="7.5" y1="8" x2="20.5" y2="21" stroke="#555" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>

    <!-- Lens outer ring — heavy dark -->
    <circle cx="-4" cy="-4" r="16" fill="none" stroke="#333" stroke-width="3"/>
    <!-- Lens ring — thick beveled -->
    <circle cx="-4" cy="-4" r="14" fill="none" stroke="#c0c0c0" stroke-width="4.5"/>
    <!-- Strong highlight arc (top-left) -->
    <path d="M-15,-15 A15,15 0 0,0 -19,-4" fill="none" stroke="#ededed" stroke-width="2" opacity="0.65" stroke-linecap="round"/>
    <path d="M-14,-16 A14,14 0 0,0 -4,-18" fill="none" stroke="#ededed" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <!-- Strong shadow arc (bottom-right) -->
    <path d="M7,7 A15,15 0 0,0 11,-4" fill="none" stroke="#555" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <path d="M5,8 A14,14 0 0,0 -4,10" fill="none" stroke="#555" stroke-width="1.5" opacity="0.45" stroke-linecap="round"/>

    <!-- Glass interior — sunken -->
    <circle cx="-4" cy="-4" r="10" fill="#555" opacity="0.18"/>
    <circle cx="-4" cy="-4" r="10" fill="none" stroke="#333" stroke-width="0.8" opacity="0.3"/>
    <!-- Glass shine — bright -->
    <path d="M-10,-13 A9,9 0 0,1 2,-13" fill="none" stroke="#ededed" stroke-width="2.2" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
