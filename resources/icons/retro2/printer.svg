<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 3D Printer — Heavy Win95 bevel -->
  <g transform="translate(32, 33)">
    <!-- Base slab — chunky beveled block -->
    <rect x="-22" y="7" width="44" height="12" rx="1" fill="#b0b0b0" stroke="#333" stroke-width="1.5"/>
    <line x1="-22" y1="7" x2="22" y2="7" stroke="#ededed" stroke-width="1.5" opacity="0.7"/>
    <line x1="-22" y1="7" x2="-22" y2="19" stroke="#ededed" stroke-width="1.5" opacity="0.5"/>
    <line x1="22" y1="7" x2="22" y2="19" stroke="#555" stroke-width="1.5" opacity="0.7"/>
    <line x1="-22" y1="19" x2="22" y2="19" stroke="#555" stroke-width="1.5" opacity="0.7"/>

    <!-- Build plate — sunken inset -->
    <rect x="-17" y="9" width="34" height="5" fill="#555" stroke="#333" stroke-width="1"/>
    <line x1="-17" y1="9" x2="17" y2="9" stroke="#333" stroke-width="0.8"/>
    <line x1="-17" y1="14" x2="17" y2="14" stroke="#888" stroke-width="0.8" opacity="0.5"/>

    <!-- Left upright — beveled column -->
    <rect x="-20" y="-25" width="7" height="32" fill="#c0c0c0" stroke="#333" stroke-width="1.5"/>
    <line x1="-20" y1="-25" x2="-20" y2="7" stroke="#ededed" stroke-width="1.2" opacity="0.6"/>
    <line x1="-20" y1="-25" x2="-13" y2="-25" stroke="#ededed" stroke-width="1.2" opacity="0.6"/>
    <line x1="-13" y1="-25" x2="-13" y2="7" stroke="#555" stroke-width="1.2" opacity="0.7"/>
    <line x1="-20" y1="7" x2="-13" y2="7" stroke="#555" stroke-width="1.2" opacity="0.7"/>

    <!-- Right upright — beveled column -->
    <rect x="13" y="-25" width="7" height="32" fill="#c0c0c0" stroke="#333" stroke-width="1.5"/>
    <line x1="13" y1="-25" x2="13" y2="7" stroke="#ededed" stroke-width="1.2" opacity="0.6"/>
    <line x1="13" y1="-25" x2="20" y2="-25" stroke="#ededed" stroke-width="1.2" opacity="0.6"/>
    <line x1="20" y1="-25" x2="20" y2="7" stroke="#555" stroke-width="1.2" opacity="0.7"/>
    <line x1="13" y1="7" x2="20" y2="7" stroke="#555" stroke-width="1.2" opacity="0.7"/>

    <!-- Crossbar — thick beveled -->
    <rect x="-20" y="-27" width="40" height="5" fill="#c0c0c0" stroke="#333" stroke-width="1.5"/>
    <line x1="-20" y1="-27" x2="20" y2="-27" stroke="#ededed" stroke-width="1.5" opacity="0.7"/>
    <line x1="-20" y1="-27" x2="-20" y2="-22" stroke="#ededed" stroke-width="1.2" opacity="0.5"/>
    <line x1="20" y1="-27" x2="20" y2="-22" stroke="#555" stroke-width="1.5" opacity="0.7"/>
    <line x1="-20" y1="-22" x2="20" y2="-22" stroke="#555" stroke-width="1.5" opacity="0.7"/>

    <!-- Gantry rail — sunken inset -->
    <rect x="-14" y="-18" width="28" height="3" fill="#888" stroke="#333" stroke-width="1"/>
    <line x1="-14" y1="-18" x2="14" y2="-18" stroke="#555" stroke-width="0.7"/>
    <line x1="-14" y1="-15" x2="14" y2="-15" stroke="#b0b0b0" stroke-width="0.7" opacity="0.5"/>

    <!-- Print head — big beveled block -->
    <rect x="-7" y="-15" width="14" height="10" rx="1" fill="#c0c0c0" stroke="#333" stroke-width="1.5"/>
    <line x1="-7" y1="-15" x2="7" y2="-15" stroke="#ededed" stroke-width="1.2" opacity="0.7"/>
    <line x1="-7" y1="-15" x2="-7" y2="-5" stroke="#ededed" stroke-width="1.2" opacity="0.5"/>
    <line x1="7" y1="-15" x2="7" y2="-5" stroke="#555" stroke-width="1.2" opacity="0.7"/>
    <line x1="-7" y1="-5" x2="7" y2="-5" stroke="#555" stroke-width="1.2" opacity="0.7"/>

    <!-- Heat block -->
    <rect x="-4" y="-5" width="8" height="4.5" rx="0.5" fill="#a8a8a8" stroke="#333" stroke-width="1.2"/>
    <line x1="-4" y1="-5" x2="4" y2="-5" stroke="#ededed" stroke-width="0.8" opacity="0.5"/>
    <line x1="4" y1="-5" x2="4" y2="-0.5" stroke="#555" stroke-width="0.8" opacity="0.6"/>

    <!-- Nozzle -->
    <path d="M-2,-0.5 L-1,2.5 L1,2.5 L2,-0.5 Z" fill="#888" stroke="#333" stroke-width="1"/>
  </g>
</svg>
