<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Hourglass — Heavy Win95 bevel -->
  <g transform="translate(32, 32)">
    <!-- Top cap — heavy beveled -->
    <rect x="-14" y="-25" width="28" height="5" rx="1.5" fill="#c0c0c0" stroke="#333" stroke-width="1.5"/>
    <line x1="-14" y1="-25" x2="14" y2="-25" stroke="#ededed" stroke-width="1.5" opacity="0.7"/>
    <line x1="-14" y1="-25" x2="-14" y2="-20" stroke="#ededed" stroke-width="1" opacity="0.5"/>
    <line x1="14" y1="-25" x2="14" y2="-20" stroke="#555" stroke-width="1.5" opacity="0.7"/>
    <line x1="-14" y1="-20" x2="14" y2="-20" stroke="#555" stroke-width="1.5" opacity="0.7"/>

    <!-- Bottom cap — heavy beveled -->
    <rect x="-14" y="20" width="28" height="5" rx="1.5" fill="#c0c0c0" stroke="#333" stroke-width="1.5"/>
    <line x1="-14" y1="20" x2="14" y2="20" stroke="#ededed" stroke-width="1.5" opacity="0.7"/>
    <line x1="-14" y1="20" x2="-14" y2="25" stroke="#ededed" stroke-width="1" opacity="0.5"/>
    <line x1="14" y1="20" x2="14" y2="25" stroke="#555" stroke-width="1.5" opacity="0.7"/>
    <line x1="-14" y1="25" x2="14" y2="25" stroke="#555" stroke-width="1.5" opacity="0.7"/>

    <!-- Glass body — thick outer outline -->
    <path d="M-11,-20
             L-11,-6
             C-11,-3 -3,-1.5 -2.5,0
             C-3,1.5 -11,3 -11,6
             L-11,20
             L11,20
             L11,6
             C11,3 3,1.5 2.5,0
             C3,-1.5 11,-3 11,-6
             L11,-20 Z"
          fill="none" stroke="#333" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M-11,-20
             L-11,-6
             C-11,-3 -3,-1.5 -2.5,0
             C-3,1.5 -11,3 -11,6
             L-11,20
             L11,20
             L11,6
             C11,3 3,1.5 2.5,0
             C3,-1.5 11,-3 11,-6
             L11,-20 Z"
          fill="none" stroke="#b0b0b0" stroke-width="2" stroke-linejoin="round"/>
    <!-- Left highlight -->
    <line x1="-11" y1="-18" x2="-11" y2="-7" stroke="#ededed" stroke-width="1.2" opacity="0.6"/>
    <line x1="-11" y1="7" x2="-11" y2="18" stroke="#ededed" stroke-width="1.2" opacity="0.6"/>
    <!-- Right shadow -->
    <line x1="11" y1="-18" x2="11" y2="-7" stroke="#555" stroke-width="1.2" opacity="0.65"/>
    <line x1="11" y1="7" x2="11" y2="18" stroke="#555" stroke-width="1.2" opacity="0.65"/>

    <!-- Sand in bottom — beveled teal -->
    <path d="M-9,20
             L-9,8
             C-9,5 -2.5,3 -1.5,1.5
             L1.5,1.5
             C2.5,3 9,5 9,8
             L9,20 Z"
          fill="#C6FF00" opacity="0.75" stroke="#333" stroke-width="1"/>
    <path d="M-9,8 C-9,5 -2.5,3 -1.5,1.5 L1.5,1.5" fill="none" stroke="#DBFF66" stroke-width="0.8" opacity="0.5"/>
    <path d="M9,8 C9,5 2.5,3 1.5,1.5" fill="none" stroke="#9ACD32" stroke-width="0.8" opacity="0.5"/>

    <!-- Sand in top — beveled teal -->
    <path d="M-9,-20 L9,-20 L9,-11 L-9,-11 Z"
          fill="#C6FF00" opacity="0.55" stroke="#333" stroke-width="1"/>
    <line x1="-9" y1="-20" x2="9" y2="-20" stroke="#DBFF66" stroke-width="0.7" opacity="0.5"/>
    <line x1="-9" y1="-11" x2="9" y2="-11" stroke="#9ACD32" stroke-width="0.7" opacity="0.5"/>

    <!-- Falling stream -->
    <rect x="-1" y="-8" width="2" height="9" rx="1" fill="#C6FF00" opacity="0.65"/>
  </g>
</svg>
